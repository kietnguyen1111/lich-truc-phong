<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Trực Phòng</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f9ff;
            --primary-color: #ff85a2;
            --secondary-color: #b8e994;
            --accent-color: #ffeaa7;
            --text-color: #2d3436;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--bg-color); 
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNhY2NlNzgiIGZpbGwtb3BhY2l0eT0iMC4xNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            padding: 10px; 
            color: var(--text-color); 
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 450px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.9); 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2); 
            border: 4px solid #fff; 
            backdrop-filter: blur(5px);
        }

        h2 { 
            text-align: center; 
            color: var(--primary-color); 
            font-size: 2em;
            margin-bottom: 25px; 
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
            position: relative;
        }
        
        h2::after {
            content: '💖';
            font-size: 0.7em;
            position: absolute;
            top: -10px;
            right: 50px;
        }

        .task-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border: 2px solid #f1f2f6;
            transition: transform 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .task-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
        }
        .task-rac::before { background-color: #fab1a0; }
        .task-nhatren::before { background-color: #81ecec; }
        .task-vesinh::before { background-color: #fd79a8; }
        .task-nhatam::before { background-color: #74b9ff; }
        .task-laynuoc::before { background-color: #ffeaa7; }

        .task-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #4a4a4a;
            margin-bottom: 15px;
            margin-top: 5px;
        }

        .current-person-container {
            text-align: center;
            margin: 15px 0;
        }
        
        .label-denluot {
            font-size: 0.8em;
            color: #888;
            display: block;
        }

        .current-person { 
            font-size: 1.8em; 
            font-weight: 700; 
            color: #fff; 
            background: linear-gradient(45deg, #ff85a2, #ffacb7); 
            padding: 10px 25px; 
            border-radius: 50px; 
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.4);
            border: 3px solid #fff;
            margin-top: 5px;
        }

        button { 
            border: none; 
            cursor: pointer; 
            font-family: 'Quicksand', sans-serif; 
            font-weight: 700; 
            transition: all 0.2s ease; 
        }

        .btn-done { 
            background-color: var(--secondary-color); 
            color: #407324; 
            padding: 12px; 
            border-radius: 15px; 
            width: 100%; 
            font-size: 1.1em; 
            box-shadow: 0 4px 0px #96d36f; 
            margin-top: 10px;
        }
        
        .btn-done:hover { transform: translateY(2px); box-shadow: 0 2px 0px #96d36f; }
        .btn-done:disabled { background-color: #ccc; box-shadow: none; cursor: not-allowed; }

        .btn-swap { 
            background-color: #f1f2f6; 
            color: #7f8c8d; 
            padding: 8px; 
            border-radius: 10px; 
            margin-top: 15px; 
            width: 100%; 
            font-size: 0.9em; 
        }

        .swap-area { 
            display: none; 
            margin-top: 15px; 
            background: var(--bg-color); 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px dashed #b2bec3; 
        }

        select { 
            padding: 10px; 
            width: 100%; 
            border-radius: 10px; 
            margin-bottom: 10px;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-confirm-swap { 
            background-color: #fab1a0; 
            color: #844233; 
            padding: 9px; 
            border-radius: 10px; 
            width: 100%;
            box-shadow: 0 3px 0px #e19584;
        }

        .footer-note { font-size: 0.8em; color: #a0a0a0; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lịch Trực Phòng</h2>
    <div id="app"></div>
    <p class="footer-note">Ghi chú: Đổi ca chỉ có tác dụng trong vòng này. Khi quay lại lượt đầu tiên, thứ tự sẽ tự reset về mặc định! ✨</p>
</div>

<script>
    // LINK WEB APP CỦA CẬU ĐÃ ĐƯỢC THAY VÀO ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygl7alzSC4JZIR6Ha6WRthKy9Nvi2o0e4T3F5R2eEXMWaxtIZDBbwPlRU_wERIrLilMw/exec";

    let masterList = [];
    let tasks = [
        { id: 'rac', className: 'task-rac', name: '🗑️ Đi đổ rác', currentIndex: 0, members: [] },
        { id: 'nhatren', className: 'task-nhatren', name: '🧹 Quét lau nhà trên', currentIndex: 0, members: [] },
        { id: 'vesinh', className: 'task-vesinh', name: '🚽 Cọ nhà vệ sinh', currentIndex: 0, members: [] },
        { id: 'nhatam', className: 'task-nhatam', name: '🚿 Dọn hà tắm', currentIndex: 0, members: [] },
        { id: 'laynuoc', className: 'task-laynuoc', name: '🚰 Đi lấy nước uống', currentIndex: 0, members: [] }
    ];

    async function loadData() {
        const app = document.getElementById('app');
        app.innerHTML = '<h3 style="text-align:center; color:#ff85a2;">Đang đồng bộ dữ liệu... ⏳</h3>';
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            masterList = data.master;
            tasks.forEach((t, i) => {
                t.currentIndex = parseInt(data.indices[i]);
                t.members = data.taskOrders[i];
            });
            render();
        } catch (error) {
            app.innerHTML = '<h3 style="text-align:center; color:red;">Lỗi kết nối App Script!</h3>';
        }
    }

    async function syncData() {
        const payload = {
            indices: tasks.map(t => t.currentIndex),
            taskOrders: tasks.map(t => t.members)
        };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        tasks.forEach((task, index) => {
            const card = document.createElement('div');
            card.className = `task-card ${task.className}`;
            card.innerHTML = `
                <div class="task-header">${task.name}</div>
                <div class="current-person-container">
                    <span class="label-denluot">Hôm nay tới lượt:</span>
                    <div class="current-person">${task.members[task.currentIndex]}</div>
                </div>
                <button class="btn-done" id="btn-done-${index}" onclick="nextTurn(${index})">Thổi bay nhiệm vụ! ✨</button>
                <button class="btn-swap" onclick="toggleSwap(${index})">Đổi người làm thay vòng này 🔄</button>
                <div id="swap-${index}" class="swap-area">
                    <label style="font-size:0.8em; color:#666;">Chọn người làm thay cho ${task.members[task.currentIndex]}:</label>
                    <select id="select-b-${index}">
                        ${task.members.map((m, i) => i !== task.currentIndex ? `<option value="${i}">${m}</option>` : '').join('')}
                    </select>
                    <button class="btn-confirm-swap" id="btn-swap-${index}" onclick="executeSwap(${index})">Xác nhận đổi ca</button>
                </div>
            `;
            app.appendChild(card);
        });
    }

    async function nextTurn(taskIndex) {
        const btn = document.getElementById(`btn-done-${taskIndex}`);
        btn.innerText = "Đang lưu... ⏳";
        btn.disabled = true;

        let nextIdx = (tasks[taskIndex].currentIndex + 1) % 11;
        tasks[taskIndex].currentIndex = nextIdx;

        // LOGIC RESET: Nếu quay lại vị trí 0 (Đăng) -> Trả thứ tự về gốc
        if (nextIdx === 0) {
            tasks[taskIndex].members = [...masterList];
        }

        render();
        await syncData();
    }

    async function executeSwap(taskIndex) {
        const personAIndex = tasks[taskIndex].currentIndex;
        const personBIndex = parseInt(document.getElementById(`select-b-${taskIndex}`).value);
        
        const btn = document.getElementById(`btn-swap-${taskIndex}`);
        btn.innerText = "Đang lưu... ⏳";
        btn.disabled = true;

        // Hoán đổi vị trí TRONG MẢNG RIÊNG của task đó
        let temp = tasks[taskIndex].members[personAIndex];
        tasks[taskIndex].members[personAIndex] = tasks[taskIndex].members[personBIndex];
        tasks[taskIndex].members[personBIndex] = temp;

        render();
        await syncData();
        alert("Đã đổi ca thành công cho vòng này!");
    }

    function toggleSwap(taskIndex) {
        const area = document.getElementById(`swap-${taskIndex}`);
        const isHidden = area.style.display === 'none' || area.style.display === '';
        document.querySelectorAll('.swap-area').forEach(el => el.style.display = 'none');
        if (isHidden) area.style.display = 'block';
    }

    loadData();
</script>

</body>
</html>
